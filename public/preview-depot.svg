<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="800" height="450" fill="#0b0f16"/>

  <!-- header -->
  <rect x="40" y="40" width="196" height="26" rx="13" fill="#141d2e" stroke="#243247"/>
  <text x="58" y="57" fill="#5b9dff" font-size="11" font-weight="600" letter-spacing="1">BACKEND · API · POSTGRES</text>
  <text x="40" y="118" fill="#e6edf3" font-size="46" font-weight="700" letter-spacing="-1">Depot</text>
  <text x="42" y="150" fill="#9aa7b4" font-size="17">A headless content API — the backend half of a CMS.</text>

  <!-- terminal card: delivery request + response -->
  <rect x="40" y="182" width="500" height="228" rx="12" fill="#0a0e13" stroke="#232c38"/>
  <circle cx="62" cy="206" r="5" fill="#ff5f57"/>
  <circle cx="80" cy="206" r="5" fill="#febc2e"/>
  <circle cx="98" cy="206" r="5" fill="#28c840"/>
  <line x1="40" y1="224" x2="540" y2="224" stroke="#1a2230"/>
  <text x="62" y="256" font-family="ui-monospace, Menlo, monospace" font-size="13.5" fill="#8aa0b6">$ curl <tspan fill="#e6edf3">/api/v1/articles</tspan></text>
  <text x="62" y="278" font-family="ui-monospace, Menlo, monospace" font-size="13.5" fill="#8aa0b6">    -H <tspan fill="#7ec699">"Authorization: Bearer depot_…"</tspan></text>
  <text x="62" y="312" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#5b9dff">200 OK</text>
  <text x="62" y="336" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8aa0b6">{ <tspan fill="#c9d4e0">"data"</tspan>: [</text>
  <text x="62" y="358" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8aa0b6">    { <tspan fill="#c9d4e0">"slug"</tspan>: <tspan fill="#7ec699">"designing-a-content-api"</tspan> },</text>
  <text x="62" y="380" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8aa0b6">    { <tspan fill="#c9d4e0">"slug"</tspan>: <tspan fill="#7ec699">"tokens-vs-sessions"</tspan> } ] }</text>

  <!-- schema motif -->
  <g transform="translate(576,196)">
    <text x="0" y="0" fill="#6b7787" font-size="11" letter-spacing="1">CONTENT MODEL</text>

    <rect x="0" y="16" width="184" height="40" rx="9" fill="#12171f" stroke="#243247"/>
    <text x="16" y="41" fill="#e6edf3" font-size="14" font-weight="600">users</text>
    <text x="150" y="41" fill="#6b7787" font-size="12">🔑</text>

    <line x1="20" y1="56" x2="20" y2="76" stroke="#2c3a4d"/>
    <rect x="12" y="76" width="172" height="40" rx="9" fill="#12171f" stroke="#243247"/>
    <text x="28" y="101" fill="#e6edf3" font-size="14" font-weight="600">collections</text>

    <line x1="32" y1="116" x2="32" y2="136" stroke="#2c3a4d"/>
    <rect x="24" y="136" width="160" height="40" rx="9" fill="#12171f" stroke="#243247"/>
    <text x="40" y="161" fill="#e6edf3" font-size="14" font-weight="600">items</text>
    <text x="120" y="161" fill="#5b9dff" font-size="11">jsonb</text>

    <g transform="translate(0,196)">
      <rect x="0" y="0" width="88" height="24" rx="12" fill="#141d2e" stroke="#243247"/>
      <text x="16" y="16" fill="#7ec699" font-size="11" font-weight="600">sessions</text>
      <rect x="96" y="0" width="88" height="24" rx="12" fill="#141d2e" stroke="#243247"/>
      <text x="110" y="16" fill="#7ec699" font-size="11" font-weight="600">API tokens</text>
    </g>
  </g>
</svg>
