<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="800" height="450" fill="#0b0f16"/>
  <!-- ground grid -->
  <g stroke="#1c2430" stroke-width="1">
    <path d="M120 400 L400 340 L680 400"/>
    <path d="M160 420 L400 360 L640 420"/>
    <path d="M400 340 L400 100"/>
  </g>
  <!-- isometric frame: 3 storeys -->
  <g stroke="#9aa5b1" stroke-width="2.5" fill="none" opacity="0.9">
    <!-- base slab -->
    <path d="M220 330 L400 288 L580 330 L400 372 Z" fill="#161b22" opacity="0.6"/>
    <!-- columns -->
    <line x1="240" y1="326" x2="240" y2="176"/><line x1="400" y1="290" x2="400" y2="140"/><line x1="560" y1="326" x2="560" y2="176"/>
    <line x1="320" y1="308" x2="320" y2="158"/><line x1="480" y1="308" x2="480" y2="158"/>
    <!-- level 2 slab -->
    <path d="M240 226 L400 190 L560 226 L400 262 Z" fill="#161b22" opacity="0.5"/>
    <!-- level 3 slab -->
    <path d="M240 176 L400 140 L560 176 L400 212 Z" fill="#161b22" opacity="0.4"/>
    <!-- beams -->
    <path d="M240 226 L560 226 M240 176 L560 176"/>
  </g>
  <!-- MEP pipes (teal/blue) -->
  <g stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M270 250 L520 250" stroke="#2dd4bf"/>
    <path d="M300 300 L500 300" stroke="#4c8dff"/>
  </g>
  <!-- clash marker -->
  <circle cx="410" cy="250" r="26" fill="#e2564a" opacity="0.25"/>
  <circle cx="410" cy="250" r="10" fill="#e2564a"/>
  <path d="M402 242 l16 16 M418 242 l-16 16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- labels -->
  <text x="40" y="52" fill="#e6edf3" font-size="16" font-weight="700">Girder</text>
  <text x="40" y="72" fill="#6b7787" font-size="12">BIM clash viewer</text>
  <g font-size="12">
    <rect x="600" y="36" width="160" height="26" rx="13" fill="rgba(226,86,74,0.14)" stroke="rgba(226,86,74,0.4)"/>
    <circle cx="618" cy="49" r="4" fill="#e2564a"/>
    <text x="630" y="53" fill="#e2564a">14 open clashes</text>
  </g>
</svg>
