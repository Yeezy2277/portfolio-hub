# Enforce a branch-naming convention on every PR into main.
# Allowed: feature/*, fix/*, chore/*, docs/*, refactor/*, ci/*, test/*
# (lowercase kebab-case after the prefix), plus main itself for direct runs.
name: Validate Branch Name

on:
  pull_request:
    branches: [main]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name against convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feature|fix|chore|docs|refactor|ci|test)\/[a-z0-9][a-z0-9._-]*$'
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "✅ Branch name follows the convention."
          else
            echo "❌ Branch '$BRANCH' does not match '$PATTERN'."
            echo "Use e.g. feature/related-posts, fix/slug-validation, chore/deps."
            exit 1
          fi
